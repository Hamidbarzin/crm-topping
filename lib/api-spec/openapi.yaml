      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayrollCalculateInput"
      responses:
        "201":
          description: Payroll calculated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollRecord"

  /payroll/{id}/approve:
    patch:
      operationId: approvePayroll
      tags: [payroll]
      summary: "[CEO/Admin] Approve a payroll record"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayrollApproveInput"
      responses:
        "200":
          description: Payroll approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollRecord"

  /payroll/{id}/reject:
    patch:
      operationId: rejectPayroll
      tags: [payroll]
      summary: "[CEO/Admin] Reject a payroll record"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayrollRejectInput"
      responses:
        "200":
          description: Payroll rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollRecord"

  /payroll/{id}/mark-paid:
    patch:
      operationId: markPayrollPaid
      tags: [payroll]
      summary: "[CEO/Admin] Mark payroll as paid"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payroll marked paid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollRecord"

  /payroll/{id}/send:
    post:
      operationId: sendPayrollEmail
      tags: [payroll]
      summary: "[CEO/Admin] Email the payroll record to its owner"
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]

  /assistant/ask:
    post:
      operationId: askAssistant
      tags: [assistant]
      summary: Ask the AI assistant a question about your CRM data (role-scoped, read-only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantAskInput"
      responses:
        "200":
          description: Assistant answer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantAskResponse"

  /compensation/calculate:
    post:
      operationId: calculateCompensation
      tags: [compensation]
      summary: Deterministic commission / bonus calculation for a customer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompensationInput"
      responses:
        "200":
          description: Full payout breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompensationResult"

  /compensation/ask:
    post:
      operationId: askCompensation
      tags: [compensation]
      summary: Free-form compensation question answered by the Compensation AI
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompensationAskInput"
      responses:
        "200":
          description: AI answer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompensationAskResponse"

  /activity:
    get:
      operationId: getActivity
      tags: [activity]
      summary: Get the activity timeline for a lead or client
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: entityType
          required: true
          schema:
            type: string
        - in: query
          name: entityId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activity log entries (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityLogEntry"

  /goals/progress:
    get:
      operationId: getGoalProgress
      tags: [goals]
      summary: Monthly goal progress vs actuals (team for managers, personal otherwise)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: month
          schema:
            type: integer
        - in: query
          name: year
          schema:
            type: integer
      responses:
        "200":
          description: Goal progress rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalProgressResponse"

  /goals:
    put:
      operationId: setGoal
      tags: [goals]
      summary: Set or update a team member's monthly goal (managers only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetGoalInput"
      responses:
        "200":
          description: The saved goal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserGoal"

  /notifications/alerts:
    get:
      operationId: getAlerts
      tags: [notifications]
      summary: Smart alerts for the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Alerts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertsResponse"

  /notifications/summary/me:
    post:
      operationId: getMySummary
      tags: [notifications]
      summary: Generate the current user's AI daily summary (optionally email it)
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SummaryRequest"
      responses:
        "200":
          description: Daily summary + alerts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryResponse"

  /notifications/reminders/run:
    post:
      operationId: runReminders
      tags: [notifications]
      summary: Send daily reminder emails now (managers only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Number of emails sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchSendResponse"

  /notifications/summaries/run:
    post:
      operationId: runSummaries
      tags: [notifications]
      summary: Send daily summary emails to all users now (managers only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Number of emails sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchSendResponse"

  /automations:
    get:
      operationId: listAutomations
      tags: [automations]
      summary: List all automations with their most recent run (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Automations with last-run status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Automation"

  /automations/{key}/run:
    post:
      operationId: runAutomation
      tags: [automations]
      summary: Run an automation now (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The recorded automation run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRun"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ─── ACTIVITY / GOALS / NOTIFICATIONS ──────────────────────────────────────

    AutomationRun:
      type: object
      required: [id, key, status, itemsAffected, ranAt]
      properties:
        id:
          type: integer
        key:
          type: string
        status:
          type: string
          enum: [success, error]
        message:
          type: ["string", "null"]
        itemsAffected:
          type: integer
        ranAt:
          type: string

    Automation:
      type: object
      required: [key, name, description, trigger, schedule]
      properties:
        key:
          type: string
        name:
          type: string
        description:
          type: string
        trigger:
          type: string
          enum: [schedule, event]
        schedule:
          type: string
        lastRun:
          oneOf:
            - $ref: "#/components/schemas/AutomationRun"
            - type: "null"

    ActivityLogEntry:
      type: object
      required: [id, action, description, createdAt]
      properties:
        id:
          type: integer
        action:
          type: string
        description:
          type: string
        metadata:
          type: ["object", "null"]
          additionalProperties: true
        userId:
          type: ["integer", "null"]
        userName:
          type: ["string", "null"]
        createdAt:
          type: string

    GoalActual:
      type: object
      required: [revenue, dealsWon, meetingsBooked, callsMade]
      properties:
        revenue:
          type: number
        dealsWon:
          type: integer
        meetingsBooked:
          type: integer
        callsMade:
          type: integer

    GoalTarget:
      type: object
      required: [targetRevenue, targetDealsWon, targetMeetingsBooked, targetCallsMade]
      properties:
        targetRevenue:
          type: number
        targetDealsWon:
          type: integer
        targetMeetingsBooked:
          type: integer
        targetCallsMade:
          type: integer

    GoalProgressRow:
      type: object
      required: [userId, userName, role, actual]
      properties:
        userId:
          type: integer
        userName:
          type: string
        role:
          type: string
        goal:
          oneOf:
            - $ref: "#/components/schemas/GoalTarget"
            - type: "null"
        actual:
          $ref: "#/components/schemas/GoalActual"

    GoalProgressResponse:
      type: object
      required: [month, year, scope, rows]
      properties:
        month:
          type: integer
        year:
          type: integer
        scope:
          type: string
        rows:
          type: array
          items:
            $ref: "#/components/schemas/GoalProgressRow"

    SetGoalInput:
      type: object
      required: [userId, month, year]
      properties:
        userId:
          type: integer
        month:
          type: integer
        year:
          type: integer
        targetRevenue:
          type: number
        targetDealsWon:
          type: integer
        targetMeetingsBooked:
          type: integer
        targetCallsMade:
          type: integer

    UserGoal:
      type: object
      required: [id, userId, month, year, targetRevenue, targetDealsWon, targetMeetingsBooked, targetCallsMade]
      properties:
        id:
          type: integer
        userId:
          type: integer
        month:
          type: integer
        year:
          type: integer
        targetRevenue:
          type: string
        targetDealsWon:
          type: integer
        targetMeetingsBooked:
          type: integer
        targetCallsMade:
          type: integer
        createdAt:
          type: string

    Alert:
      type: object
      required: [type, severity, message]
      properties:
        type:
          type: string
        severity:
          type: string
        message:
          type: string
        entityType:
          type: string
        entityId:
          type: integer

    AlertsResponse:
      type: object
      required: [alerts]
      properties:
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/Alert"

    SummaryRequest:
      type: object
      properties:
        send:
          type: boolean

    SummaryResponse:
      type: object
      required: [summary, alerts, emailed]
      properties:
        summary:
          type: string
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/Alert"
        emailed:
          type: boolean

    BatchSendResponse:
      type: object
      required: [sent]
      properties:
        sent:
          type: integer

    # ─── AUTH ─────────────────────────────────────────────────────────────────

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    # ─── USER ─────────────────────────────────────────────────────────────────

    User:
      type: object
      required: [id, email, name, role]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [CEO, Admin, Marketing_Manager, Sales_Rep, Closer, IT_Manager, Employee]
        slug:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string

    UserInput:
      type: object
      required: [email, name, role, password]
      properties:
        email:
          type: string
        name:
          type: string
        role:
          type: string
        password:
          type: string
        slug:
          type: string

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
        slug:
          type: string
        avatarUrl:
          type: string
        isActive:
          type: boolean

    # ─── COMPANY ──────────────────────────────────────────────────────────────

    Company:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        industry:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    CompanyInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        industry:
          type: string
        website:
          type: string
        phone:
          type: string
        address:
          type: string
        notes:
          type: string

    CompanyUpdate:
      type: object
      properties:
        name:
          type: string
        industry:
          type: string
        website:
          type: string
        phone:
          type: string
        address:
          type: string
        notes:
          type: string

    # ─── CLIENT ───────────────────────────────────────────────────────────────

    Client:
      type: object
      required: [id, name, email]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        companyId:
          type: ["integer", "null"]
        companyName:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, inactive, prospect]
        monthlyRevenue:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        ownerId:
          type: ["integer", "null"]
        createdAt:
          type: string

    ClientInput:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        companyId:
          type: integer
        status:
          type: string
        monthlyRevenue:
          type: number
        notes:
          type: string
        ownerId:
          type: integer

    ClientUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        companyId:
          type: integer
        status:
          type: string
        monthlyRevenue:
          type: number
        notes:
          type: string
        ownerId:
          type: integer

    # ─── LEAD ─────────────────────────────────────────────────────────────────

    Lead:
      type: object
      required: [id, name, stage]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        companyId:
          type: ["integer", "null"]
        companyName:
          type: ["string", "null"]
        stage:
          type: string
          enum: [new, contacted, qualified, proposal, negotiation, closed_won, closed_lost]
        source:
          type: ["string", "null"]
        ownerId:
          type: ["integer", "null"]
        ownerName:
          type: ["string", "null"]
        value:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        linkedinUrl:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]
        status:
          type: string
          enum: [new_lead, contacted_email, contacted_call, contacted_linkedin, meeting_scheduled, meeting_done, proposal_sent, negotiating, closed_won, closed_lost, not_interested, nurturing]
        aiScore:
          type: ["integer", "null"]
        scoreReason:
          type: ["string", "null"]
        priority:
          type: ["string", "null"]
          enum: [HOT, WARM, COLD, null]
        aiNextAction:
          type: ["string", "null"]
        gtaNode:
          type: ["integer", "null"]
        activityType:
          type: ["string", "null"]
          enum: [email, call, meeting, linkedin_message, follow_up, null]
        nextActionDate:
          type: ["string", "null"]
        meetingDate:
          type: ["string", "null"]
        emailsSent:
          type: integer
        emailsReceived:
          type: integer
        createdAt:
          type: string

    LeadInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        companyId:
          type: integer
        stage:
          type: string
        source:
          type: string
        ownerId:
          type: integer
        value:
          type: number
        notes:
          type: string
        linkedinUrl:
          type: string
        industry:
          type: string
        status:
          type: string
        gtaNode:
          type: integer
        activityType:
          type: string
        nextActionDate:
          type: string
        meetingDate:
          type: string
        emailsSent:
          type: integer
        emailsReceived:
          type: integer

    LeadUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        companyId:
          type: integer
        stage:
          type: string
        source:
          type: string
        ownerId:
          type: integer
        value:
          type: number
        notes:
          type: string
        linkedinUrl:
          type: string
        industry:
          type: string
        status:
          type: string
        gtaNode:
          type: integer
        activityType:
          type: string
        nextActionDate:
          type: string
        meetingDate:
          type: string
        emailsSent:
          type: integer
        emailsReceived:
          type: integer

    LogActivityInput:
      type: object
      required: [activityType]
      properties:
        activityType:
          type: string
          enum: [email, call, meeting, linkedin_message, follow_up]
        notes:
          type: string
        status:
          type: string
        nextActionDate:
          type: string

    ScheduleMeetingInput:
      type: object
      required: [startTime, endTime]
      properties:
        title:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        location:
          type: string
        onlineLink:
          type: string
        notes:
          type: string

    MarketingKpi:
      type: object
      required:
        [
          totalLeads,
          newLeads,
          hotLeads,
          warmLeads,
          coldLeads,
          replyRate,
          conversionRate,
          meetingsScheduled,
          meetingsDone,
          proposalsSent,
          closedWon,
          closedLost,
          pipelineValue,
          closedWonValue,
          emailsSent,
          emailsReceived,
          avgScore,
          monthlyTarget,
          monthlyClosedWon,
          sourceBreakdown,
        ]
      properties:
        totalLeads:
          type: integer
        newLeads:
          type: integer
        hotLeads:
          type: integer
        warmLeads:
          type: integer
        coldLeads:
          type: integer
        replyRate:
          type: number
        conversionRate:
          type: number
        meetingsScheduled:
          type: integer
        meetingsDone:
          type: integer
        proposalsSent:
          type: integer
        closedWon:
          type: integer
        closedLost:
          type: integer
        pipelineValue:
          type: number
        closedWonValue:
          type: number
        emailsSent:
          type: integer
        emailsReceived:
          type: integer
        avgScore:
          type: number
        monthlyTarget:
          type: integer
        monthlyClosedWon:
          type: integer
        sourceBreakdown:
          type: array
          items:
            type: object
            required: [source, count]
            properties:
              source:
                type: string
              count:
                type: integer

    MarketingReportInput:
      type: object
      properties:
        email:
          type: string

    MarketingReport:
      type: object
      required: [report]
      properties:
        report:
          type: string
        emailed:
          type: boolean

    # ─── DEAL ─────────────────────────────────────────────────────────────────

    Deal:
      type: object
      required: [id, title, stage]
      properties:
        id:
          type: integer
        title:
          type: string
        stage:
          type: string
          enum: [prospecting, qualification, proposal, negotiation, closed_won, closed_lost]
        value:
          type: ["number", "null"]
        clientId:
          type: ["integer", "null"]
        clientName:
          type: ["string", "null"]
        companyId:
          type: ["integer", "null"]
        salesRepId:
          type: ["integer", "null"]
        salesRepName:
          type: ["string", "null"]
        closerId:
          type: ["integer", "null"]
        closerName:
          type: ["string", "null"]
        createdById:
          type: ["integer", "null"]
        commissionStatus:
          type: string
          enum: [pending, approved, paid, clawback]
        clawbackStatus:
          type: ["string", "null"]
        grossMarginPercent:
          type: ["string", "number", "null"]
        submissionStatus:
          type: string
          enum: [draft, submitted, approved, rejected]
        submittedAt:
          type: ["string", "null"]
        reviewedAt:
          type: ["string", "null"]
        reviewNotes:
          type: ["string", "null"]
        founderApprovalStatus:
          type: string
          enum: [not_required, pending, approved, rejected]
        founderApproval:
          type: boolean
        expectedCloseDate:
          type: ["string", "null"]
        closedAt:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    DealInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        stage:
          type: string
        value:
          type: number
        clientId:
          type: integer
        companyId:
          type: integer
        salesRepId:
          type: integer
        closerId:
          type: integer
        grossMarginPercent:
          type: number
        expectedCloseDate:
          type: string
        notes:
          type: string

    DealUpdate:
      type: object
      properties:
        title:
          type: string
        stage:
          type: string
        value:
          type: number
        clientId:
          type: integer
        companyId:
          type: integer
        salesRepId:
          type: integer
        closerId:
          type: integer
        commissionStatus:
          type: string
        clawbackStatus:
          type: string
        grossMarginPercent:
          type: number
        expectedCloseDate:
          type: string
        closedAt:
          type: string
        notes:
          type: string

    DealReviewInput:
      type: object
      required: [approved]
      properties:
        approved:
          type: boolean
        notes:
          type: string

    FounderApprovalInput:
      type: object
      required: [approved]
      properties:
        approved:
          type: boolean

    ClawbackInput:
      type: object
      properties:
        reason:
          type: string

    PipelineSummary:
      type: object
      required: [stages, totalValue, totalDeals]
      properties:
